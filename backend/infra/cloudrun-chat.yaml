# Cloud Run — modular monolith (chat API). Adjust project/region.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: harper-chat
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 120
      containers:
        - image: gcr.io/PROJECT/harper-chat:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: harper-db-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: harper-redis-url
                  key: latest
            - name: HARPER_FEATURE_CACHE_TTL_SECONDS
              value: "45"
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
